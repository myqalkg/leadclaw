<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>领爪 V5.5 | 交互原型确认稿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #333; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
        .miniapp-container {
            width: 375px; height: 667px; /* 模拟 iPhone 8/SE 比例 */
            background: #f7f7f7; position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.5); border-radius: 40px;
            overflow: hidden; border: 8px solid #111;
            display: flex; flex-direction: column;
        }

        /* 顶部模拟 */
        .wechat-nav { height: 75px; background: white; padding-top: 30px; padding-left: 20px; display: flex; align-items: center; border-bottom: 0.5px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .capsule-mock { position: absolute; right: 10px; top: 35px; width: 80px; height: 28px; border: 1px solid rgba(0,0,0,0.1); border-radius: 14px; background: rgba(255,255,255,0.6); }

        /* 微信授权弹窗模拟 (隐藏状态) */
        #auth-modal { position: absolute; bottom: 0; width: 100%; height: 0; background: rgba(0,0,0,0.4); z-index: 2000; transition: height 0.3s ease; display: flex; align-items: flex-end; }
        .modal-content { width: 100%; background: white; border-radius: 12px 12px 0 0; padding: 30px 20px; transform: translateY(100%); transition: transform 0.3s ease; }
        #auth-modal.active { height: 100%; }
        #auth-modal.active .modal-content { transform: translateY(0); }

        /* 元素状态反馈 */
        .item-card { transition: all 0.1s; cursor: pointer; }
        .item-card:active { transform: scale(0.96); opacity: 0.8; }
        
        .tab-item { transition: 0.2s; cursor: pointer; }
        .tab-item.active { color: #EA580C; font-weight: bold; }

        .auth-bar {
            position: absolute; bottom: 50px; width: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="miniapp-container">
        <!-- 微信原生导航 -->
        <div class="wechat-nav">
            <span class="font-black text-sm tracking-widest text-orange-600">LEAD-CLAW</span>
            <div class="capsule-mock"></div>
        </div>

        <!-- 滚动列表 -->
        <div class="overflow-y-auto flex-1 p-3 pb-32">
            <div class="mb-4 flex justify-between items-end">
                <h2 class="text-xl font-black italic">BURST.</h2>
                <span class="text-[9px] font-bold text-gray-400">SYNC: 10:50:42</span>
            </div>

            <div id="feed" class="grid grid-cols-2 gap-3">
                <!-- 商品卡片会通过 render 注入 -->
            </div>
        </div>

        <!-- V5.5 授权引导条 (可交互) -->
        <div class="auth-bar" onclick="showAuth()">
            <div class="flex items-center">
                <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center mr-2 text-sm italic">🐾</div>
                <div class="text-white">
                    <p class="text-[10px] font-bold">获取神价机器人通知</p>
                    <p class="text-[8px] text-gray-400">授权手机号，开启 24h 推送</p>
                </div>
            </div>
            <button class="bg-orange-600 text-white text-[9px] font-black px-3 py-1.5 rounded-lg active:scale-95 transition">立即开启</button>
        </div>

        <!-- 底部 TabBar (可交互) -->
        <div class="h-[50px] bg-white border-t flex justify-around items-center shrink-0">
            <div class="tab-item active flex flex-col items-center" onclick="setTab(this)">
                <span class="text-lg">🔥</span><span class="text-[8px] mt-0.5">神价</span>
            </div>
            <div class="tab-item flex flex-col items-center opacity-40 text-gray-500" onclick="setTab(this)">
                <span class="text-lg">📦</span><span class="text-[8px] mt-0.5">分类</span>
            </div>
            <div class="tab-item flex flex-col items-center opacity-40 text-gray-400" onclick="setTab(this)">
                <span class="text-lg">👤</span><span class="text-[8px] mt-0.5">我的</span>
            </div>
        </div>

        <!-- 微信原生模拟弹窗 (交互核心) -->
        <div id="auth-modal" onclick="hideAuth()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-sm font-bold">微信授权</span>
                    <span class="text-gray-400 text-xl" onclick="hideAuth()">&times;</span>
                </div>
                <p class="text-xs text-gray-600 mb-6 italic leading-relaxed">"领爪 Lead-Claw" 申请获取您的手机号，用于同步神价监控通知。</p>
                <div class="bg-gray-50 border p-4 rounded-xl mb-6 text-sm flex justify-between items-center">
                    <span class="font-bold">138 **** 8888</span>
                    <span class="text-blue-600 text-[10px] font-bold uppercase">使用其他号码</span>
                </div>
                <button onclick="alert('授权成功！已为您开启 24h 实时推送。'); hideAuth();" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition">允许</button>
                <p class="text-center mt-4 text-[10px] text-gray-400">授权即同意《用户协议》及《隐私条款》</p>
            </div>
        </div>
    </div>

    <script>
        // 研发攻坚：获取真实 JSON 数据流 (来自数据桥接层)
        let ALL_ITEMS = []; // 存储全量数据，不再全量渲染
        let current_page = 1;
        const page_size = 20;

        async function loadItems() {
            try {
                const response = await fetch('/src/shared/burst_items.json');
                ALL_ITEMS = await response.json();
                renderPage(1); // 默认加载第一页
                console.log(`Loaded ${ALL_ITEMS.length} items. Rendering first ${page_size}.`);
            } catch (error) {
                console.error("Failed to load real-time burst items:", error);
                render([]);
            }
        }

        // 研发优化：分页渲染逻辑 (针对 1,000+ 数据量)
        function renderPage(page) {
            const start = (page - 1) * page_size;
            const end = page * page_size;
            const items_to_show = ALL_ITEMS.slice(0, end);
            render(items_to_show);
        }

        // 监听滚动加载更多 (Lazy Load)
        window.addEventListener('scroll', () => {
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            if (scrollTop + clientHeight >= scrollHeight - 300) {
                if (ALL_ITEMS.length > current_page * page_size) {
                    current_page++;
                    renderPage(current_page);
                    console.log(`Lazy loading page ${current_page}...`);
                }
            }
        });

        // 模拟微信授权
        function showAuth() { document.getElementById('auth-modal').classList.add('active'); }
        function hideAuth() { document.getElementById('auth-modal').classList.remove('active'); }
        function setTab(el) {
            document.querySelectorAll('.tab-item').forEach(t => {
                t.classList.remove('active', 'opacity-100');
                t.classList.add('opacity-40');
            });
            el.classList.add('active', 'opacity-100');
            el.classList.remove('opacity-40');
        }

        // 执行加载
        loadItems();
        // 研发预览：每 10 秒尝试同步一次数据，模拟真实 Push
        setInterval(loadItems, 10000);
    </script>
</body>
</html>
