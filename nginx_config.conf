# Lead-Claw 生产环境 Nginx 配置 (SOP v1.0)

server {
    listen 80;
    server_name opencloud-uat.gzmiyuan.com;
    # 强制将所有 HTTP 流量重定向至 HTTPS
    return 301 https://\$host\$request_uri;
}

server {
    listen 443 ssl;
    server_name opencloud-uat.gzmiyuan.com;

    # SSL 证书配置
    ssl_certificate /home/admin/.openclaw/workspace/lead-claw/opencloud-uat.gzmiyuan.com.pem;
    ssl_certificate_key /home/admin/.openclaw/workspace/lead-claw/opencloud-uat.gzmiyuan.com.key;

    # 安全协议加固
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 核心数据分发逻辑 (Data Bridge Integration)
    location /src/shared/ {
        alias /home/admin/.openclaw/workspace/lead-claw/src/shared/;
        add_header 'Access-Control-Allow-Origin' '*';
        autoindex on;
    }

    # 错误处理
    error_page 500 502 503 504 /50x.html;
}
